name: Mern CI pipeline
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: install backend dependencies
        run: |
          cd backend
          npm install
      - name: Run backend
        run: |
          cd backend
          node index.js &
          sleep 3
          curl http://localhost:5000

  frontend:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Frontend
        run: |
          cd frontend
          npm install
      - name: build frontend
        run: |
          cd frontend
          npm run build